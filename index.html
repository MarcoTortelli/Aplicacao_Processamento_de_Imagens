<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <title>Processamento de Imagens</title>
        <link rel="stylesheet" href="styles.css" />
    </head>

    <body>
        <main class="page">
            <header class="page-header">
                <h1>Trabalho de Processamento de Imagens</h1>
            </header>

            <section class="panel">
                <h2>Entrada</h2>
                <div class="upload-grid">
                    <div class="upload-field">
                        <label for="uploadImagem1">Imagem 1</label>
                        <input
                            type="file"
                            id="uploadImagem1"
                            accept=".bmp,.jpg,.jpeg,.png,image/bmp,image/jpeg,image/png"
                        />
                    </div>

                    <div class="upload-field">
                        <label for="uploadImagem2">Imagem 2</label>
                        <input
                            type="file"
                            id="uploadImagem2"
                            accept=".bmp,.jpg,.jpeg,.png,image/bmp,image/jpeg,image/png"
                        />
                    </div>
                </div>
            </section>

            <section class="panel">
                <div class="canvas-grid">
                    <div class="canvas-box">
                        <h2>Imagem 1</h2>
                        <canvas id="canvasOriginal1"></canvas>
                    </div>

                    <div class="canvas-box">
                        <h2>Imagem 2</h2>
                        <canvas id="canvasOriginal2"></canvas>
                    </div>

                    <div class="canvas-box">
                        <h2>Resultado</h2>
                        <canvas id="canvasResultado"></canvas>
                        <div class="control-row">
                            <button
                                class="primary-action"
                                onclick="salvarImagemResultado()"
                            >
                                Salvar imagem resultado
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="panel operations-grid">
                <div class="operation-group">
                    <h2>Operações Aritméticas</h2>
                    <div class="control-row">
                        <button onclick="somarImagens()">Somar imagens</button>
                        <button onclick="subtrairImagens()">Subtrair imagens</button>
                        <button onclick="mediaImagens()">Media das imagens</button>
                    </div>
                    <div class="control-row">
                        <input type="number" id="valorSomaConstante" value="50" />
                        <button onclick="somarConstanteImagem()">Somar constante</button>
                    </div>
                    <div class="control-row">
                        <input
                            type="number"
                            id="valorSubtracaoConstante"
                            value="50"
                        />
                        <button onclick="subtrairConstanteImagem()">
                            Subtrair constante
                        </button>
                    </div>
                    <div class="control-row">
                        <input
                            type="number"
                            id="valorMultiplicacaoConstante"
                            value="1.5"
                            step="0.1"
                        />
                        <button onclick="multiplicarConstanteImagem()">
                            Multiplicar constante
                        </button>
                    </div>
                    <div class="control-row">
                        <input
                            type="number"
                            id="valorDivisaoConstante"
                            value="2"
                            step="0.1"
                        />
                        <button onclick="dividirConstanteImagem()">
                            Dividir constante
                        </button>
                    </div>
                    <div class="control-row">
                        <input
                            type="number"
                            id="valorBlending"
                            value="0.5"
                            min="0"
                            max="1"
                            step="0.1"
                        />
                        <button onclick="blendingImagens()">
                            Aplicar Blending nas imagens
                        </button>
                    </div>
                </div>

                <div class="operation-group">
                    <h2>Operações Pontuais</h2>
                    <div class="control-row">
                        <button onclick="converterParaEscalaDeCinza()">
                            Converter para escala de cinza
                        </button>
                        <button onclick="limiarizacaoImagem()">
                            Limiarização de Imagem
                        </button>
                        <button onclick="negativoImagem()">Negativo da Imagem</button>
                    </div>
                    <div class="control-row">
                        <button onclick="inverterImagemEsquerdaDireita()">
                            Inverter esquerda-direita
                        </button>
                        <button onclick="inverterImagemCimaBaixo()">
                            Inverter cima-baixo
                        </button>
                        <button onclick="normalizarHistogramaImagem()">
                            Normalizar histograma
                        </button>
                    </div>
                    <div class="control-row">
                        <button onclick="diferencaImagens()">
                            Diferenca entre as imagens
                        </button>
                    </div>
                </div>

                <div class="operation-group">
                    <h2>Operações Lógicas</h2>
                    <div class="control-row">
                        <button onclick="operacaoNotImagem()">Operação NOT</button>
                        <button onclick="operacaoAndImagens()">Operação AND</button>
                        <button onclick="operacaoOrImagens()">Operação OR</button>
                        <button onclick="operacaoXorImagens()">Operação XOR</button>
                    </div>
                </div>

                <div class="operation-group">
                    <h2>Filtros Passa-Baixa</h2>
                    <div class="control-row">
                        <button onclick="filtroMaxImagem()">Filtro MAX</button>
                        <button onclick="filtroMinImagem()">Filtro MIN</button>
                        <button onclick="filtroMeanImagem()">Filtro MEAN</button>
                        <button onclick="filtroMedianaImagem()">Filtro MEDIANA</button>
                    </div>
                    <div class="control-row">
                        <input
                            type="number"
                            id="valorOrdemFiltro"
                            value="1"
                            min="1"
                        />
                        <button onclick="filtroOrdemImagem()">Filtro ORDEM</button>
                    </div>
                    <div class="control-row">
                        <button onclick="filtroSuavizacaoConservativaImagem()">
                            Suavização Conservativa
                        </button>
                    </div>
                    <div class="control-row">
                        <input
                            type="number"
                            id="valorSigmaGaussiano"
                            value="1"
                            min="0.1"
                            step="0.1"
                        />
                        <button onclick="filtroGaussianoImagem()">
                            Filtro GAUSSIANO
                        </button>
                    </div>
                </div>

                <div class="operation-group">
                    <h2>Filtros Passa-Alta</h2>
                    <div class="control-row">
                        <button onclick="filtroPrewittImagem()">Borda Prewitt</button>
                        <button onclick="filtroSobelImagem()">Borda Sobel</button>
                        <button onclick="filtroLaplacianoImagem()">
                            Borda Laplaciano
                        </button>
                    </div>
                </div>

                <div class="operation-group">
                    <h2>Operações Morfológicas</h2>
                    <div class="control-row">
                        <button onclick="dilatacaoImagem()">Dilatação</button>
                        <button onclick="erosaoImagem()">Erosão</button>
                        <button onclick="aberturaImagem()">Abertura</button>
                        <button onclick="fechamentoImagem()">Fechamento</button>
                        <button onclick="contornoImagem()">Contorno</button>
                    </div>
                </div>
            </section>

        </main>

        <script src="js/dom.js"></script>
        <script src="js/estado.js"></script>
        <script src="js/imagem.js"></script>
        <script src="js/validacao.js"></script>
        <script src="js/operacoes-aritmeticas.js"></script>
        <script src="js/operacoes-processamento.js"></script>
        <script src="js/filtros.js"></script>
        <script src="js/morfologia.js"></script>
        <script src="js/main.js"></script>
    </body>
</html>
